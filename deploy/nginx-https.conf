# Пример конфигурации Nginx для приложения «Анонимное Анкетирование»
# Продакшен: HTTPS через Let's Encrypt (certbot добавит server { listen 443 ssl; ... }).
# Перед получением сертификата достаточно блока ниже (listen 80).
# Замените anketa.example.com на ваш домен.

server {
    listen 80;
    server_name anketa.example.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# После запуска certbot --nginx -d anketa.example.com появится второй server { listen 443 ssl; ... }
# с теми же location и путями к сертификатам. Редактировать вручную не обязательно.
